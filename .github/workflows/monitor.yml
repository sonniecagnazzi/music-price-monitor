name: Music Price Monitor

on:
  schedule:
    - cron: '23 */4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modalità controllo: all oppure single'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - single
      monitor_id:
        description: 'ID monitor singolo, richiesto se mode=single'
        required: false
        default: ''
        type: string

concurrency:
  group: music-price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "UTC now: $(date -u)"
          echo "Mode: ${{ github.event.inputs.mode }}"
          echo "Monitor ID: ${{ github.event.inputs.monitor_id }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --network-timeout 300000 --ignore-engines --non-interactive --no-progress

      - name: Run monitor
        run: yarn monitor
        env:
          MONITOR_MODE: ${{ github.event.inputs.mode || 'all' }}
          MONITOR_ID: ${{ github.event.inputs.monitor_id }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          DEFAULT_ALERT_EMAIL: ${{ secrets.DEFAULT_ALERT_EMAIL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
