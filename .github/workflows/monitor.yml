name: Music Price Monitor

on:
  workflow_dispatch:

jobs:
  scraper-condition-test:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "UTC now: $(date -u)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --network-timeout 300000 --ignore-engines --non-interactive --no-progress

      - name: Run scraper condition test
        run: npx tsx scripts/test-scraper-condition.ts
